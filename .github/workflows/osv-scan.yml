name: OSV-Scanner

on:
  push:
    branches: [main]
    paths:
      - "tests/vendor/**"
      - ".github/workflows/osv-scan.yml"
  pull_request:
    paths:
      - "tests/vendor/**"
      - ".github/workflows/osv-scan.yml"
  schedule:
    - cron: "0 7 * * 1" # Mondays 07:00 UTC

permissions:
  contents: read

jobs:
  scan:
    permissions:
      contents: read
      issues: write
      security-events: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run OSV-Scanner on vendored deps
        uses: google/osv-scanner-action/osv-scanner-action@c51854704019a247608d928f370c98740469d4b5 # v2.3.5
        with:
          scan-args: |-
            --recursive
            tests/vendor/
            tests/VENDOR-MANIFEST.json
      - name: File issue on findings
        if: failure()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          RUN_ID: ${{ github.run_id }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        with:
          script: |
            const runId = process.env.RUN_ID;
            const repoUrl = process.env.REPO_URL;
            const today = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[osv-scan] Vulnerability in vendored dependency (${today})`,
              body: `OSV-Scanner found a vulnerability in tests/vendor/.\n\nRun: ${repoUrl}/actions/runs/${runId}`,
              labels: ['security', 'vendor']
            });
