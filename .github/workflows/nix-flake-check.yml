name: Nix flake check

on:
  push:
    branches: [main]
    paths:
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/nix-flake-check.yml"
  pull_request:
    paths:
      - "flake.nix"
      - "flake.lock"
      - "scripts/lint.sh"
      - "skills/**"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Nix
        uses: cachix/install-nix-action@616559265b40713947b9c190a8ff4b507b5df49b # v31.10.4
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: nix flake check
        run: nix flake check --no-build
      - name: Verify lock file consistency
        run: |
          if ! git diff --exit-code flake.lock; then
            echo "FATAL: flake.lock is stale — run 'nix flake lock' locally and commit"
            exit 1
          fi
