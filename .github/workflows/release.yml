name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install test deps (incl. modern bash — macOS ships bash 3.2)
        run: brew install bash bats-core shellcheck shfmt jq gnu-tar
      - name: Run full test suite under modern bash
        run: |
          echo "system bash: $(/bin/bash --version | head -n1)"
          echo "brew bash:   $(/opt/homebrew/bin/bash --version | head -n1 || /usr/local/bin/bash --version | head -n1)"
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          bash scripts/lint.sh

  build:
    needs: test
    runs-on: macos-15
    permissions:
      contents: read
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install build deps
        run: brew install gnu-tar jq
      - name: Build deterministic tarball
        run: bash scripts/build-release.sh dist/claude-mac-chrome.tar.gz
      - name: Compute hashes
        id: hash
        run: |
          cd dist
          shasum -a 256 claude-mac-chrome.tar.gz > SHA256SUMS
          b64=$(shasum -a 256 claude-mac-chrome.tar.gz | base64 -w0 2>/dev/null || shasum -a 256 claude-mac-chrome.tar.gz | base64)
          printf 'hashes=%s\n' "$b64" >> "$GITHUB_OUTPUT"
      - name: Upload dist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-dist
          path: dist/
          retention-days: 7

  sbom:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      - name: Generate CycloneDX + SPDX 2.3 SBOMs
        run: syft . -o cyclonedx-json=sbom.cdx.json -o spdx-json=sbom.spdx.json
      - name: Upload SBOMs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: |
            sbom.cdx.json
            sbom.spdx.json

  provenance:
    needs: [build]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.build.outputs.hashes }}"
      upload-assets: true

  sign-and-release:
    needs: [build, sbom, provenance]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-dist
          path: dist/
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sbom
          path: dist/
      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
      - name: Sign tarball (keyless OIDC)
        run: |
          cd dist
          cosign sign-blob --yes \
            --bundle claude-mac-chrome.tar.gz.sigstore \
            claude-mac-chrome.tar.gz
      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            dist/claude-mac-chrome.tar.gz
            dist/SHA256SUMS
            dist/claude-mac-chrome.tar.gz.sigstore
            dist/sbom.cdx.json
            dist/sbom.spdx.json
          generate_release_notes: true
