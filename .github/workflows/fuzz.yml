name: Fuzz

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install radamsa
        run: sudo apt-get update && sudo apt-get install -y radamsa
      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20.18.1"
      - name: Fuzz URL blocklist with radamsa
        run: bash tests/fuzz/radamsa-urls.sh
      - name: Fuzz HTML grammar
        run: node tests/fuzz/html-grammar.mjs --iterations=10000
      - name: Fuzz Unicode confusables
        run: node tests/fuzz/unicode-confusables.mjs
      - name: File issue on crash
        if: failure()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          RUN_ID: ${{ github.run_id }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        with:
          script: |
            const runId = process.env.RUN_ID;
            const repoUrl = process.env.REPO_URL;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[fuzz] P1 — crash or envelope violation in nightly fuzz run`,
              body: `Run: ${repoUrl}/actions/runs/${runId}\n\nSee logs for reproducer.`,
              labels: ['fuzz', 'p1', 'security']
            });
