name: Benchmarks

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bench:
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install deps
        run: brew install jq
      - name: Run benchmarks
        run: bash tests/bench/run.sh
      - name: Upload results
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: bench-results
          path: docs/benchmarks/
