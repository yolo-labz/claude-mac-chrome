sonar.projectKey=yolo-labz_claude-mac-chrome
sonar.projectName=claude-mac-chrome
sonar.organization=yolo-labz

# Source roots
sonar.sources=skills,scripts
sonar.tests=tests

# Bats + Playwright + JS test inclusion patterns
sonar.test.inclusions=**/*.bats,**/*.spec.ts,**/*.test.mjs,**/*.test.js

# Keep the scanner out of vendored bundles, fixtures, generated code, and launch kit
sonar.exclusions=tests/vendor/**,tests/fixtures/**,tests/js-fixtures/**,tests/integration/node_modules/**,launch/**,.specify/**,docs/benchmarks/**

# Shell/Bash plugin needs shellcheck in PATH on the scanner
sonar.sourceEncoding=UTF-8
sonar.shellcheck.reportPaths=reports/shellcheck.json

# Permanent waiver: the happy-dom bundle at tests/vendor/happy-dom.mjs is
# byte-verified against upstream and intentionally not scanned.
